# Publish both packages to NPM when a GitHub release is created.
name: Publish

on:
  workflow_dispatch:

  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Set up Node for npm publish
        uses: actions/setup-node@499817a2b6e7a2fbd6490d5d6b1c9634a3c6613 # v4.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build core
        run: cd packages/core && bun run build

      - name: Build react
        run: cd packages/react && bun run build

      - name: Publish core
        working-directory: packages/core
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if echo "$VERSION" | grep -q "-"; then
            TAG=$(echo "$VERSION" | sed 's/.*-\([a-zA-Z]*\).*/\1/')
            echo "Publishing @runwayml/avatars prerelease with --tag $TAG"
            npm publish --access public --tag "$TAG"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish react
        working-directory: packages/react
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if echo "$VERSION" | grep -q "-"; then
            TAG=$(echo "$VERSION" | sed 's/.*-\([a-zA-Z]*\).*/\1/')
            echo "Publishing @runwayml/avatars-react prerelease with --tag $TAG"
            npm publish --access public --tag "$TAG"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
